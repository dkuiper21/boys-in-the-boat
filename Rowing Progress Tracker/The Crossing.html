  <!-- Firebase SDK (modular, from CDN). Initialized and stashed on window so

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";

      getFirestore, collection, addDoc, deleteDoc, doc,
      onSnapshot, query, orderBy,
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCE2ApprBlupTm5tSACe1mjP0rX1k-1qwU",
      authDomain: "boys-in-the-boat.firebaseapp.com",
      projectId: "boys-in-the-boat",
      storageBucket: "boys-in-the-boat.firebasestorage.app",
      messagingSenderId: "516600107190",
      appId: "1:516600107190:web:a838c1ce9f84d54e1fd617",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.firebase = {
      db,
      collection, addDoc, deleteDoc, doc,
      onSnapshot, query, orderBy,
    };
    window.dispatchEvent(new CustomEvent("firebase-ready"));
  </script>
